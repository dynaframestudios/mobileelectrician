<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You – Mobile Electrician Pietermaritzburg</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root{--blue:#003DA5;--orange:#FF6600;--bg:#f8faff;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Barlow',sans-serif;background:var(--bg);display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px;}
    .card{background:#fff;border-radius:20px;padding:56px 48px;text-align:center;max-width:520px;box-shadow:0 12px 48px rgba(0,61,165,.12);}
    .icon{font-size:4rem;margin-bottom:20px;}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:2.4rem;font-weight:900;color:var(--blue);margin-bottom:14px;text-transform:uppercase;}
    p{font-size:1rem;color:#7a8599;line-height:1.7;margin-bottom:8px;}
    .highlight{color:var(--orange);font-weight:700;}
    .btn{display:inline-flex;align-items:center;gap:8px;margin-top:28px;padding:14px 28px;background:linear-gradient(135deg,var(--orange) 0%,#cc4d00 100%);color:#fff;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;box-shadow:0 4px 20px rgba(255,102,0,.35);}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <h1>Message Sent!</h1>
    <p>Thanks for reaching out to <span class="highlight">Mobile Electrician</span> in Pietermaritzburg.</p>
    <p>We'll review your request and get back to you <span class="highlight">within a few hours</span>.</p>
    <p style="margin-top:16px">Need urgent help? WhatsApp or call us directly:</p>
    <p style="font-size:1.3rem;font-weight:700;color:#003DA5;margin-top:8px">072 485 6575</p>
    <a href="/" class="btn">← Back to Website</a>
  </div>
</body>
</html>
